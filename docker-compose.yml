version: '3.8'

services:
  # ──────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: laboure_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-laboure_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - laboure_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-laboure_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────
  # Node.js / NestJS Application
  # ──────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=development
    container_name: laboure_app
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres123}@postgres:5432/${DB_NAME:-laboure_db}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-your-secret-key-change-in-production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      API_URL: ${API_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - laboure_network
    command: >
      sh -c "npm run start:dev"
    restart: unless-stopped

  # ──────────────────────────────────────
  # PgAdmin (Database Management - Opcional)
  # ──────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: laboure_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@laboure.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - laboure_network
    restart: unless-stopped
    profiles:
      - debug

# ──────────────────────────────────────
# Networks
# ──────────────────────────────────────
networks:
  laboure_network:
    driver: bridge

# ──────────────────────────────────────
# Volumes
# ──────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local